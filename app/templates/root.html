<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task & Habit API</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #f8fafc 0%, #eef2f7 100%);
        color: #0f172a;
        padding: 1.5rem;
      }
      main {
        width: 100%;
        max-width: 420px;
        text-align: center;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 20px;
        padding: 2.5rem 2rem;
        box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
      }
      .badge {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.3;
        margin-bottom: 0.75rem;
      }
      .creator {
        font-size: 0.9rem;
        color: #64748b;
        margin-bottom: 1.75rem;
      }
      .links {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      a {
        display: block;
        padding: 0.85rem 1rem;
        border-radius: 12px;
        font-size: 0.95rem;
        font-weight: 500;
        text-decoration: none;
        color: #0f172a;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        transition:
          background 0.2s ease,
          border-color 0.2s ease,
          transform 0.2s ease;
      }
      a:hover {
        background: #ffffff;
        border-color: #cbd5e1;
        transform: translateY(-1px);
      }
      a span {
        display: block;
        font-size: 0.75rem;
        font-weight: 400;
        color: #64748b;
        margin-top: 0.15rem;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="badge">REST API</p>
      <h1>Task & Habit API</h1>
      <p class="creator">Created by metthew</p>
      <div class="links">
        <a href="{{docs_url}}">
          API docs
          <span>Swagger UI</span>
        </a>
        <a href="{{github_url}}">
          GitHub repo
          <span>Source code</span>
        </a>
      </div>
    </main>
  </body>
</html>
